<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>给不安世界的好消息</title>

    <style>
      :root {
        --olive-dark: #142414;
        --olive: #506b2f;
        --olive-soft: #8fa75a;
        --gold: #f2c75c;
        --warm-gold: #eaa34b;
        --cream: #fff7df;
        --white: #ffffff;
        --ink: #161812;
        --muted: rgba(255, 255, 255, 0.78);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #1f2518;
        font-family:
          "Noto Sans SC", "Microsoft YaHei", "PingFang SC", Inter, Avenir,
          "Segoe UI", Helvetica, Arial, sans-serif;
        color: var(--white);
      }

      body {
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .poster {
        position: relative;
        width: min(100%, 820px);
        aspect-ratio: 8.5 / 11;
        overflow: hidden;
        background:
          radial-gradient(
            circle at 52% 38%,
            rgba(255, 241, 178, 0.92) 0%,
            rgba(239, 169, 66, 0.78) 18%,
            rgba(131, 91, 36, 0.32) 34%,
            rgba(28, 42, 24, 0.08) 52%,
            rgba(15, 25, 16, 0.9) 100%
          ),
          linear-gradient(135deg, #24381f 0%, #7d7a31 45%, #162414 100%);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.55);
        isolation: isolate;
      }

      .poster::before {
        position: absolute;
        inset: -12%;
        z-index: -2;
        content: "";
        background:
          linear-gradient(
            112deg,
            transparent 0%,
            rgba(255, 255, 255, 0.11) 22%,
            transparent 42%
          ),
          linear-gradient(
            72deg,
            transparent 8%,
            rgba(255, 234, 152, 0.16) 34%,
            transparent 54%
          ),
          repeating-linear-gradient(
            102deg,
            rgba(255, 255, 255, 0.025) 0,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px,
            transparent 54px
          );
        transform: rotate(-5deg);
      }

      .poster::after {
        position: absolute;
        inset: auto -5% -8% -5%;
        height: 36%;
        z-index: -1;
        content: "";
        background:
          radial-gradient(
            ellipse at center,
            rgba(255, 255, 255, 0.7) 0%,
            rgba(255, 247, 223, 0.62) 25%,
            rgba(255, 247, 223, 0.28) 48%,
            transparent 72%
          ),
          linear-gradient(
            to top,
            rgba(255, 247, 223, 0.9),
            rgba(255, 247, 223, 0.14),
            transparent
          );
        filter: blur(1px);
      }

      .noise {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0.28;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 18px 18px;
        mix-blend-mode: overlay;
      }

      .olive-branch {
        position: absolute;
        right: -48px;
        top: 108px;
        width: 290px;
        height: 500px;
        z-index: 2;
        opacity: 0.24;
        transform: rotate(-16deg);
      }

      .olive-branch span {
        position: absolute;
        left: 50%;
        width: 4px;
        height: 470px;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 999px;
        transform: translateX(-50%);
      }

      .olive-branch i {
        position: absolute;
        width: 62px;
        height: 28px;
        background: rgba(255, 255, 255, 0.58);
        border-radius: 999px 0 999px 0;
        transform-origin: left center;
      }

      .olive-branch i:nth-child(2) {
        top: 42px;
        left: 138px;
        transform: rotate(-34deg);
      }

      .olive-branch i:nth-child(3) {
        top: 92px;
        left: 86px;
        transform: rotate(152deg);
      }

      .olive-branch i:nth-child(4) {
        top: 142px;
        left: 140px;
        transform: rotate(-30deg);
      }

      .olive-branch i:nth-child(5) {
        top: 194px;
        left: 82px;
        transform: rotate(150deg);
      }

      .olive-branch i:nth-child(6) {
        top: 248px;
        left: 140px;
        transform: rotate(-30deg);
      }

      .olive-branch i:nth-child(7) {
        top: 302px;
        left: 84px;
        transform: rotate(150deg);
      }

      .olive-branch i:nth-child(8) {
        top: 360px;
        left: 140px;
        transform: rotate(-30deg);
      }

      .content {
        position: relative;
        z-index: 3;
        display: flex;
        min-height: 100%;
        flex-direction: column;
        padding: 48px 54px 42px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 13px;
        min-width: 0;
      }

      .brand img {
        width: 46px;
        height: 46px;
        object-fit: contain;
        filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.25));
      }

      .club-text {
        display: grid;
        gap: 2px;
        text-transform: uppercase;
        letter-spacing: 0.13em;
      }

      .club-text strong {
        font-size: 13px;
        font-weight: 850;
      }

      .club-text span {
        color: var(--muted);
        font-size: 9px;
        font-weight: 700;
      }

      .presented {
        border: 1px solid rgba(255, 255, 255, 0.38);
        border-radius: 999px;
        padding: 8px 13px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.86);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        backdrop-filter: blur(14px);
      }

      .hero {
        display: grid;
        flex: 1;
        align-content: center;
        padding: 38px 0 28px;
      }

      .eyebrow {
        width: fit-content;
        margin-bottom: 20px;
        border-left: 5px solid var(--gold);
        padding: 7px 0 7px 14px;
        color: var(--cream);
        font-size: 16px;
        font-weight: 750;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.28);
      }

      h1 {
        max-width: 720px;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: -0.055em;
        line-height: 0.82;
        font-size: clamp(74px, 15vw, 142px);
        font-weight: 950;
        text-shadow:
          0 8px 0 rgba(26, 36, 18, 0.28),
          0 20px 55px rgba(0, 0, 0, 0.36);
      }

      .title-good {
        display: block;
        color: #fff8dc;
        white-space: nowrap;
      }

      .title-news {
        display: block;
        color: transparent;
        white-space: nowrap;
        -webkit-text-stroke: 2px rgba(255, 255, 255, 0.88);
        text-shadow:
          0 8px 0 rgba(26, 36, 18, 0.18),
          0 18px 55px rgba(0, 0, 0, 0.32);
      }

      .script {
        display: block;
        margin-top: -10px;
        margin-left: 11px;
        color: var(--gold);
        white-space: nowrap;
        font-family:
          "STKaiti", "KaiTi", "华文行楷", "Brush Script MT", "Segoe Script",
          cursive;
        font-size: clamp(54px, 10vw, 100px);
        font-weight: 400;
        letter-spacing: -0.04em;
        line-height: 0.9;
        text-transform: none;
        text-shadow: 0 12px 32px rgba(59, 40, 8, 0.45);
        transform: rotate(-3deg);
      }

      .hook {
        max-width: 610px;
        margin: 30px 0 0;
        color: rgba(255, 255, 255, 0.92);
        font-size: 24px;
        font-weight: 650;
        line-height: 1.25;
        text-shadow: 0 6px 24px rgba(0, 0, 0, 0.32);
      }

      .subhook {
        max-width: 570px;
        margin: 13px 0 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 15px;
        font-weight: 500;
        line-height: 1.55;
      }

      .details {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: end;
        gap: 28px;
        margin-top: 28px;
      }

      .info-card {
        display: grid;
        gap: 18px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 28px;
        padding: 23px 24px;
        background:
          linear-gradient(
            135deg,
            rgba(13, 28, 15, 0.78),
            rgba(84, 107, 46, 0.48)
          ),
          rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 55px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(18px);
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }

      .meta-item {
        min-height: 78px;
        border-radius: 19px;
        padding: 14px 15px;
        background: rgba(255, 255, 255, 0.1);
      }

      .meta-item span {
        display: block;
        margin-bottom: 7px;
        color: rgba(255, 255, 255, 0.58);
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .meta-item strong {
        display: block;
        color: #fff9df;
        font-size: 17px;
        font-weight: 850;
        line-height: 1.12;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
      }

      .tag {
        border-radius: 999px;
        padding: 8px 11px;
        background: rgba(255, 214, 98, 0.18);
        color: #fff3c2;
        font-size: 11px;
        font-weight: 850;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .qr-wrap {
        display: grid;
        width: 164px;
        justify-items: center;
        gap: 10px;
        border-radius: 27px;
        padding: 15px;
        background: rgba(255, 247, 223, 0.95);
        color: var(--ink);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      }

      .qr-wrap img {
        width: 132px;
        height: 132px;
        object-fit: contain;
      }

      .qr-wrap strong {
        font-size: 13px;
        font-weight: 950;
        letter-spacing: 0.04em;
        text-align: center;
        text-transform: uppercase;
      }

      .website {
        color: rgba(22, 24, 18, 0.68);
        font-size: 10px;
        font-weight: 800;
      }

      .footer-note {
        margin-top: 15px;
        color: rgba(255, 255, 255, 0.64);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-align: center;
        text-transform: uppercase;
      }

      @media (max-width: 760px) {
        body {
          padding: 12px;
        }

        .content {
          padding: 36px 32px 30px;
        }

        .presented {
          display: none;
        }

        .details {
          grid-template-columns: 1fr;
        }

        .qr-wrap {
          width: 100%;
          grid-template-columns: auto 1fr;
          justify-items: start;
          text-align: left;
        }

        .qr-wrap img {
          width: 116px;
          height: 116px;
        }

        .meta {
          grid-template-columns: 1fr;
        }
      }

      @page {
        size: letter;
        margin: 0;
      }

      @media print {
        html,
        body {
          width: 8.5in;
          height: 11in;
          margin: 0;
          padding: 0;
          background: white;
        }

        body {
          display: block;
        }

        .poster {
          width: 8.5in;
          height: 11in;
          box-shadow: none;
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
        }
      }
    </style>
  </head>

  <body>
    <main class="poster" aria-label="给不安世界的好消息海报">
      <div class="noise"></div>

      <div class="olive-branch" aria-hidden="true">
        <span></span>
        <i></i>
        <i></i>
        <i></i>
        <i></i>
        <i></i>
        <i></i>
        <i></i>
      </div>

      <section class="content">
        <header class="topbar">
          <div class="brand">
            <img
              src="bigLogo.png"
              alt="Green Olive Chinese Christian Club 标志"
            />
            <div class="club-text">
              <strong>Green Olive</strong>
              <span>Chinese Christian Club</span>
            </div>
          </div>

          <div class="presented">校园活动</div>
        </header>

        <section class="hero">
          <div class="eyebrow">坦诚提问的开放之夜</div>

          <h1>
            <span class="title-good">给不安</span>
            <span class="title-news">世界</span>
            <span class="script">的好消息海报</span>
          </h1>

          <p class="hook">
            在焦虑不安、充满不确定的世界里，还有真正的好消息吗？
          </p>

          <p class="subhook">
            友善介绍基督教福音，随后开放问答与深入讨论。基督徒、慕道友、怀疑者，以及单纯好奇的朋友，都欢迎参加。
          </p>
        </section>

        <section class="details" aria-label="活动详情与报名">
          <div>
            <div class="info-card">
              <div class="meta">
                <div class="meta-item">
                  <span>内容</span>
                  <strong>福音讲座</strong>
                </div>

                <div class="meta-item">
                  <span>还有</span>
                  <strong>开放问答</strong>
                </div>

                <div class="meta-item">
                  <span>对象</span>
                  <strong>所有学生</strong>
                </div>
              </div>

              <div class="tags">
                <span class="tag">基督教</span>
                <span class="tag">意义</span>
                <span class="tag">盼望</span>
                <span class="tag">交流讨论</span>
              </div>
            </div>

            <div class="footer-note">扫码查看时间、地点与报名</div>
          </div>

          <aside class="qr-wrap" aria-label="报名二维码">
            <img src="evangilism_event_qr_code.png" alt="活动报名二维码" />
            <div>
              <strong>扫码报名</strong>
              <div class="website">www.goccc.ca</div>
            </div>
          </aside>
        </section>
      </section>
    </main>
  </body>
</html>
